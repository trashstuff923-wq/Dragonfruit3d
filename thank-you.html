<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Dragonfruit 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0015 0%, #1a0030 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 2.5rem;
            color: #00FF9D;
            margin-bottom: 1rem;
            font-family: 'Orbitron', sans-serif;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: #00FF9D;
            color: #0a0015;
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn:hover {
            background: #00D47A;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 157, 0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>REQUEST RECEIVED!</h1>
        <p>Thank you for your quote request! We've received your details and will get back to you within 24 hours.</p>
        <p>We'll contact you via the email or phone number you provided.</p>
        <a href="/" class="btn">BACK TO HOME</a>
    </div>
</body>
</html>
