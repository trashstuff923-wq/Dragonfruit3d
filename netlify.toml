[build]
  # This is a static HTML site — there is NO build step. We set an explicit no-op command so
  # Netlify's Git deploys don't try to infer/run `npm run build` (which doesn't exist) and fail.
  # Netlify still installs function deps from package.json and bundles the functions below.
  command = "echo 'Static site — no build needed'"
  functions = "netlify/functions"
  publish = "."

[build.environment]
  # Netlify's secret scanner fails the build if an env-var VALUE appears in the published files.
  # ADMIN_KEY is the data-dashboard password (used only server-side in get-orders.js). If its value
  # happens to match a word on the site, the scanner false-positives. It's never written into any
  # deployed file, so it's safe to omit it from scanning.
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_KEY"

[functions]
  node_bundler = "esbuild"

# Cache STL files for 1 year — they rarely change and are big.
# After first load, subsequent 3D viewer opens are instant (served from browser cache).
[[headers]]
  for = "/*.stl"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Same for product images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"  # 30 days
