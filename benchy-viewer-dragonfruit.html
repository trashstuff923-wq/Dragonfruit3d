<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Benchy Viewer | Dragonfruit 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0096;
            --secondary: #ff5ec7;
            --dark: #1a0a2e;
            --darker: #0a0015;
            --accent: #00ffff;
            --text: #e0e6ed;
            --text-dim: #8892a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--darker);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        .sidebar {
            background: var(--dark);
            border-right: 1px solid rgba(0, 255, 157, 0.2);
            padding: 2rem;
            overflow-y: auto;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .model-info {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(0, 255, 157, 0.1);
        }

        .model-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .model-description {
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .upload-area {
            border: 2px dashed var(--primary);
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 255, 157, 0.05);
        }

        .upload-area:hover {
            background: rgba(0, 255, 157, 0.1);
            border-color: var(--secondary);
        }

        .upload-area.drag-over {
            background: rgba(0, 255, 157, 0.15);
            border-color: var(--secondary);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        #fileInput {
            display: none;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .color-option {
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .color-option:hover {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .color-option.active {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.2);
        }

        .color-option.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }

        .color-option[data-color="white"].active::after,
        .color-option[data-color="yellow"].active::after {
            color: #000;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        .color-name {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.1rem;
            color: var(--text);
            font-weight: 700;
            text-transform: capitalize;
        }

        .controls {
            margin-bottom: 2rem;
            display: none;
        }

        .controls.active {
            display: block;
        }

        .control-buttons {
            display: grid;
            gap: 0.5rem;
        }

        .control-btn {
            padding: 0.8rem;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            color: var(--primary);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--primary);
            color: var(--dark);
            border-color: var(--primary);
        }

        .clear-btn {
            background: rgba(255, 0, 110, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .clear-btn:hover {
            background: var(--accent);
            color: white;
        }

        .viewer {
            position: relative;
            background: linear-gradient(135deg, #0a0e27 0%, #050813 100%);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 255, 157, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .instructions {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            background: rgba(10, 14, 39, 0.9);
            border: 1px solid rgba(0, 255, 157, 0.3);
            padding: 1rem 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            backdrop-filter: blur(10px);
        }

        .instructions strong {
            color: var(--primary);
            font-weight: 700;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid rgba(0, 255, 157, 0.2);
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">DRAGONFRUIT 3D</div>
            
            <div class="model-info">
                <h1 class="model-name">3D Benchy</h1>
                <p class="model-description">Interactive 3D viewer with real-time color customization.</p>
            </div>

            <div class="controls active" id="controls">
                <h2 class="section-title">Color</h2>
                <div class="color-grid">
                    <div class="color-option active" data-color="yellow" style="background: #FFD700;"></div>
                    <div class="color-option" data-color="cyan" style="background: #00d4ff;"></div>
                    <div class="color-option" data-color="purple" style="background: #9D4EDD;"></div>
                    <div class="color-option" data-color="green" style="background: #00ff9d;"></div>
                    <div class="color-option" data-color="red" style="background: #FF006E;"></div>
                    <div class="color-option" data-color="orange" style="background: #FF8C00;"></div>
                    <div class="color-option" data-color="black" style="background: #1a1a1a;"></div>
                    <div class="color-option" data-color="white" style="background: #FFFFFF;"></div>
                </div>
                <div class="color-name" id="colorName">Yellow</div>

                <h2 class="section-title" style="margin-top: 2rem;">Controls</h2>
                <div class="control-buttons">
                    <button class="control-btn" onclick="resetCamera()">Reset View</button>
                    <button class="control-btn" id="autoRotateBtn" onclick="toggleAutoRotate()">Auto Rotate</button>
                </div>
            </div>
        </div>

        <div class="viewer">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">LOADING 3D BENCHY...</div>
            </div>

            <div id="canvas-container"></div>

            <div class="instructions">
                <strong>Mouse:</strong> Drag to rotate • Scroll to zoom<br>
                <strong>Touch:</strong> One finger to rotate • Pinch to zoom
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const colorMap = {
            'yellow': 0xFFD700,
            'cyan': 0x00d4ff,
            'purple': 0x9D4EDD,
            'green': 0x00ff9d,
            'red': 0xFF006E,
            'orange': 0xFF8C00,
            'black': 0x1a1a1a,
            'white': 0xFFFFFF
        };

        let scene, camera, renderer, model;
        let autoRotate = false;
        let currentColor = 'yellow';

        function init() {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050813);

            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(0, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(5, 10, 5);
            mainLight.castShadow = true;
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0x00ffff, 0.3);
            fillLight.position.set(-5, 5, -5);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xff5ec7, 0.4);
            rimLight.position.set(0, 5, -10);
            scene.add(rimLight);

            // Grid
            const gridHelper = new THREE.GridHelper(20, 20, 0xff0096, 0x1a0a2e);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            setupControls();
            setupColorPicker();

            window.addEventListener('resize', onWindowResize);

            animate();

            // Auto-load the model from the server
            autoLoadModel();
        }

        function autoLoadModel() {
            document.getElementById('loading').classList.add('show');
            
            // Try to load from same directory as the HTML file
            fetch('./3dbenchy.stl')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Model file not found');
                    }
                    return response.arrayBuffer();
                })
                .then(arrayBuffer => {
                    loadModelFromArrayBuffer(arrayBuffer);
                })
                .catch(error => {
                    console.error('Error loading model:', error);
                    document.getElementById('loading').classList.remove('show');
                    document.querySelector('.loading-text').textContent = 'ERROR: 3dbenchy.stl not found';
                    
                    // Show helpful message
                    alert('Model file not found!\n\nPlease ensure "3dbenchy.stl" is in the same folder as this HTML file.\n\nFor local testing, you may need to run a local web server.');
                });
        }
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            let rotation = { x: 0, y: 0 };

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;

                    rotation.y += deltaX * 0.01;
                    rotation.x += deltaY * 0.01;
                    rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotation.x));

                    updateCameraPosition();
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const currentDistance = camera.position.length();
                const newDistance = currentDistance + (e.deltaY * 0.01);
                const clampedDistance = Math.max(5, Math.min(30, newDistance));
                camera.position.setLength(clampedDistance);
            });

            function updateCameraPosition() {
                const distance = camera.position.length();
                camera.position.x = distance * Math.sin(rotation.y) * Math.cos(rotation.x);
                camera.position.y = distance * Math.sin(rotation.x);
                camera.position.z = distance * Math.cos(rotation.y) * Math.cos(rotation.x);
                camera.lookAt(scene.position);
            }

            window.cameraRotation = rotation;
            window.updateCameraPosition = updateCameraPosition;
        }

        function setupColorPicker() {
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
                    this.classList.add('active');
                    
                    const color = this.dataset.color;
                    currentColor = color;
                    
                    if (model) {
                        model.material.color.setHex(colorMap[color]);
                    }
                    
                    document.getElementById('colorName').textContent = 
                        color.charAt(0).toUpperCase() + color.slice(1);
                });
            });
        }

        function loadModelFromArrayBuffer(arrayBuffer) {
            const loader = new THREE.STLLoader();
            
            try {
                const geometry = loader.parse(arrayBuffer);
                
                // Compute smooth vertex normals for better appearance
                geometry.computeVertexNormals();
                
                if (model) {
                    scene.remove(model);
                }
                
                const material = new THREE.MeshPhongMaterial({
                    color: colorMap[currentColor],
                    shininess: 60,
                    specular: 0x444444,
                    flatShading: false  // Ensure smooth shading
                });

                model = new THREE.Mesh(geometry, material);
                geometry.center();
                
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 5 / maxDim;
                model.scale.setScalar(scale);

                model.castShadow = true;
                model.receiveShadow = true;
                
                scene.add(model);

                document.getElementById('loading').classList.remove('show');
            } catch (error) {
                console.error('Error loading model:', error);
                document.getElementById('loading').classList.remove('show');
                alert('Error loading model. Please try again.');
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (autoRotate && model) {
                model.rotation.y += 0.005;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function resetCamera() {
            camera.position.set(0, 10, 15);
            camera.lookAt(scene.position);
            if (window.cameraRotation) {
                window.cameraRotation.x = 0;
                window.cameraRotation.y = 0;
            }
        }

        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            document.getElementById('autoRotateBtn').classList.toggle('active');
        }

        // STL Loader
        THREE.STLLoader = function () {};
        THREE.STLLoader.prototype = {
            parse: function (data) {
                const isBinary = (data) => {
                    const reader = new DataView(data);
                    const numFaces = reader.getUint32(80, true);
                    return 80 + 4 + (numFaces * 50) === reader.byteLength;
                };
                return isBinary(data) ? this.parseBinary(data) : this.parseASCII(data);
            },

            parseBinary: function (data) {
                const reader = new DataView(data);
                const faces = reader.getUint32(80, true);
                const geometry = new THREE.BufferGeometry();
                const vertices = [];

                // Don't use face normals from STL, we'll compute smooth normals
                for (let face = 0; face < faces; face++) {
                    const start = 84 + face * 50;
                    // Skip the normal data (12 bytes)
                    
                    for (let i = 1; i <= 3; i++) {
                        const vertexstart = start + i * 12;
                        vertices.push(reader.getFloat32(vertexstart, true));
                        vertices.push(reader.getFloat32(vertexstart + 4, true));
                        vertices.push(reader.getFloat32(vertexstart + 8, true));
                    }
                }

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                // Don't set normals here - let Three.js compute them smoothly
                return geometry;
            },

            parseASCII: function (data) {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];

                if (typeof data !== 'string') {
                    const decoder = new TextDecoder();
                    data = decoder.decode(new Uint8Array(data));
                }

                const patternFace = /facet([\s\S]*?)endfacet/g;
                const patternFloat = /[\s]+([+-]?(?:\d*)(?:\.\d*)?(?:[eE][+-]?\d+)?)/.source;
                const patternVertex = new RegExp('vertex' + patternFloat + patternFloat + patternFloat, 'g');

                let result;

                while ((result = patternFace.exec(data)) !== null) {
                    const text = result[0];
                    
                    let vertexResult;
                    while ((vertexResult = patternVertex.exec(text)) !== null) {
                        vertices.push(parseFloat(vertexResult[1]), parseFloat(vertexResult[2]), parseFloat(vertexResult[3]));
                    }
                }

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                // Don't set normals - let Three.js compute smooth normals
                return geometry;
            }
        };

        init();
    </script>
</body>
</html>
